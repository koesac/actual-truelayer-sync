name: Deploy

on:
  workflow_run:
    workflows:
      - Publish
    branches:
      - main
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted
    steps:
      - name: Pull latest images
        run: docker compose -f ~/docker-compose.yml pull actual-truelayer-sync actual-truelayer-setup

      - name: Restart containers
        run: docker compose -f ~/docker-compose.yml up -d actual-truelayer-sync

      - name: Clean up old images
        run: docker image prune -f
