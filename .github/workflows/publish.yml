name: Publish & Deploy

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed

jobs:
  publish:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push sync image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/koesac-lab/actual-truelayer-sync:latest
            ghcr.io/koesac-lab/actual-truelayer-sync:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push setup image
        uses: docker/build-push-action@v6
        with:
          context: ./truelayer-setup
          push: true
          tags: |
            ghcr.io/koesac-lab/actual-truelayer-setup:latest
            ghcr.io/koesac-lab/actual-truelayer-setup:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: publish
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Sync repo to stable deploy path
        run: |
          DEPLOY_DIR=/home/koesac/apps/actual-truelayer-sync
          mkdir -p "$DEPLOY_DIR"
          rsync -a --delete \
            --exclude '.git/' \
            --exclude 'node_modules/' \
            "$GITHUB_WORKSPACE"/ "$DEPLOY_DIR"/

      - name: Pull latest images
        working-directory: /home/koesac/apps/actual-truelayer-sync
        run: docker compose pull actual-truelayer-sync actual-truelayer-setup

      - name: Restart containers
        working-directory: /home/koesac/apps/actual-truelayer-sync
        run: docker compose up -d actual-truelayer-sync

      - name: Clean up old images
        run: docker image prune -f
