name: Publish

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push sync image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/koesac-lab/actual-truelayer-sync:latest
            ghcr.io/koesac-lab/actual-truelayer-sync:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push setup image
        uses: docker/build-push-action@v6
        with:
          context: ./truelayer-setup
          push: true
          tags: |
            ghcr.io/koesac-lab/actual-truelayer-setup:latest
            ghcr.io/koesac-lab/actual-truelayer-setup:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
