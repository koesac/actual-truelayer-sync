services:
  actual-truelayer-sync:
    image: ghcr.io/sheppy/actual-truelayer-sync:latest
    container_name: actual-truelayer-sync
    restart: unless-stopped
    # depends_on:
    #   - actual-budget
    volumes:
      - ./actual-truelayer-sync/data:/app/data # This is where your config.json lives
    environment:
      # - TZ=Europe/London
      - ACTUAL_SERVER_URL=http://[HOST_IP]:5006
      - ACTUAL_SERVER_PASSWORD=[PASSWORD]
      - ACTUAL_SYNC_ID=[SYNC_ID]
      - TRUELAYER_CLIENT_ID=[TRUELAYER_CLIENT_ID]
      - TRUELAYER_CLIENT_SECRET=[TRUELAYER_CLIENT_SECRET]
      - CRON_SCHEDULE=0 */4 * * * # Example: Every 4 hours
      # Inherited from .env — set TRUELAYER_ENV=sandbox there to enable sandbox mode.
      # Both services pick it up automatically with no other changes needed.
      - TRUELAYER_ENV
    healthcheck:
      # Health check that state.json has been modified recently, indicating the sync is running successfully.
      # 300 minutes (5 hours) against a 4-hour schedule — gives an hour of buffer
      test: ["CMD-SHELL", "find /app/data/state.json -mmin -300 | grep -q ."]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 120s

  # ── Setup UI (run on-demand only, never starts with normal `docker compose up`) ──
  # Usage:
  #   docker compose --profile setup up -d truelayer-setup
  #   Open http://<your-server>:3099, complete OAuth, map accounts
  #   docker compose --profile setup down truelayer-setup
  truelayer-setup:
    build: ./truelayer-setup
    container_name: truelayer-setup
    ports:
      - "3099:3099"
    environment:
      - TRUELAYER_CLIENT_ID=[TRUELAYER_CLIENT_ID]
      - TRUELAYER_CLIENT_SECRET=[TRUELAYER_CLIENT_SECRET]
      - REDIRECT_URI=http://[HOST_IP]:3099/callback
      # Inherited from .env — same TRUELAYER_ENV value as the sync container.
      - TRUELAYER_ENV
    volumes:
      - ./actual-truelayer-sync/data:/app/data # Shared with actual-truelayer-sync
    profiles:
      - setup
