services:
  truelayer-sync:
    image: ghcr.io/koesac/actual-truelayer-sync:latest
    container_name: truelayer-sync
    restart: unless-stopped
    # depends_on:
    #   actual-budget:           # Uncomment if Actual Budget runs in the same compose stack.
    #     condition: service_healthy
    volumes:
      - ./actual-truelayer-sync/data:/app/data # config.json and state.json live here
    environment:
      # Required
      - ACTUAL_SERVER_URL=${ACTUAL_SERVER_URL}
      - ACTUAL_SERVER_PASSWORD=${ACTUAL_SERVER_PASSWORD}
      - ACTUAL_SYNC_ID=${ACTUAL_SYNC_ID}
      - TRUELAYER_CLIENT_ID=${TRUELAYER_CLIENT_ID}
      - TRUELAYER_CLIENT_SECRET=${TRUELAYER_CLIENT_SECRET}
      # Optional — inherited from .env
      - CRON_SCHEDULE=${CRON_SCHEDULE:-}
      - TZ=${TZ:-UTC}
      - LOG_FORMAT=${LOG_FORMAT:-}
      - DEBUG=${DEBUG:-}
      # Set TRUELAYER_ENV=sandbox in .env to enable sandbox mode.
      # Both services pick it up automatically.
      - TRUELAYER_ENV=${TRUELAYER_ENV:-}
    healthcheck:
      # Checks that state.json has been modified recently, indicating sync is running.
      # 300 minutes (5 hours) gives an hour of buffer against a 4-hour schedule.
      # The "-f" guard prevents false "unhealthy" on a brand-new install before
      # the first sync has run.
      test: ["CMD-SHELL", "[ ! -f /app/data/state.json ] || find /app/data/state.json -mmin -300 | grep -q ."]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 120s

  # ── Setup UI (run on-demand only, never starts with normal `docker compose up`) ──
  # Usage:
  #   docker compose --profile setup up -d truelayer-setup
  #   Open http://<your-server>:3099
  #   docker compose --profile setup down truelayer-setup   ← do this when done!
  truelayer-setup:
    build: ./truelayer-setup
    container_name: truelayer-setup
    ports:
      - "3099:3099"
    environment:
      # Required
      - TRUELAYER_CLIENT_ID=${TRUELAYER_CLIENT_ID}
      - TRUELAYER_CLIENT_SECRET=${TRUELAYER_CLIENT_SECRET}
      - REDIRECT_URI=${REDIRECT_URI}         # Must match your TrueLayer Console redirect URI
      # Optional — passed through for Actual account browser and mode display
      - ACTUAL_SERVER_URL=${ACTUAL_SERVER_URL:-}
      - ACTUAL_SERVER_PASSWORD=${ACTUAL_SERVER_PASSWORD:-}
      - TRUELAYER_ENV=${TRUELAYER_ENV:-}
    volumes:
      - ./actual-truelayer-sync/data:/app/data # Shared with truelayer-sync
    profiles:
      - setup
